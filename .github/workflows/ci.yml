name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy

  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests with coverage gate
        run: pytest --cov=pyiecwind --cov-report=term-missing

  docs:
    name: Build documentation
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with docs extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build HTML docs (warnings as errors)
        run: sphinx-build -W -b html docs docs/_build/html

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html

  build:
    name: Build & wheel smoke test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Install wheel into a clean environment and smoke test
        run: |
          python -m venv /tmp/wheel-env
          /tmp/wheel-env/bin/python -m pip install --upgrade pip
          /tmp/wheel-env/bin/python -m pip install dist/*.whl
          /tmp/wheel-env/bin/python -c "import pyiecwind; print('pyiecwind', pyiecwind.__version__)"
          /tmp/wheel-env/bin/pyiecwind template /tmp/smoke_template.ipt
          test -f /tmp/smoke_template.ipt

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
