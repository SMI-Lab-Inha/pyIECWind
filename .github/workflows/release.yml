name: Release

# On a version tag, builds the distributions with a build-provenance attestation
# and attaches them to the GitHub Release. PyPI publishing is intentionally NOT
# enabled yet (the package is not on PyPI); see the commented step at the end to
# enable it once a PyPI Trusted Publisher is configured
# (https://docs.pypi.org/trusted-publishers/).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Build, attest, and attach release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create/update the GitHub Release and upload assets
      id-token: write       # OIDC: trusted publishing + attestation signing
      attestations: write   # build provenance attestation
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Upload distributions as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Attach distributions to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

      # PyPI publishing is disabled until the project is on PyPI with a Trusted
      # Publisher configured. To enable, uncomment the step below.
      # - name: Publish to PyPI (trusted publishing)
      #   uses: pypa/gh-action-pypi-publish@release/v1
