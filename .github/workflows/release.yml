name: Release

# Builds the distributions with a build-provenance attestation when a version tag
# is pushed. PyPI publishing is intentionally NOT enabled yet (the package is not
# on PyPI); see the commented step at the end to enable it once a PyPI Trusted
# Publisher is configured (https://docs.pypi.org/trusted-publishers/).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC: trusted publishing + attestation signing
      attestations: write   # build provenance attestation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      # PyPI publishing is disabled until the project is on PyPI with a Trusted
      # Publisher configured. To enable, uncomment the step below.
      # - name: Publish to PyPI (trusted publishing)
      #   uses: pypa/gh-action-pypi-publish@release/v1
